name: smart_waste_management
description: "A smart waste management system mobile application with dual login, real-time notifications, and bin tracking."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: any
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  firebase_messaging: any
  google_maps_flutter: any
  geolocator: any
  provider: any
  http: any
  image_picker: any
  intl: any
  shared_preferences: any
  dio: any
  get_it: any
  connectivity_plus: any
  permission_handler: any
  cached_network_image: any
  uuid: any
  google_fonts: any
  flutter_dotenv: any
  web3dart: any
  url_launcher: ^6.0.0 # Added url_launcher

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any

flutter:
  uses-material-design: true
